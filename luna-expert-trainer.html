/* ══════════════════════════════════════════
   HELPER: format bold/italic text
══════════════════════════════════════════ */
function FmtText({text}){
  const lines=text.split("\n");
  return(<>{lines.map((line,i)=>{
    const html=line.replace(/\*\*(.+?)\*\*/g,'<strong style="color:#e2c9ff">$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>');
    return(<span key={i}><span dangerouslySetInnerHTML={{__html:html}}/>{i<lines.length-1&&<br/>}</span>);
  })}</>);
}

    </div>
  );
}

/* ── KNOWLEDGE HUB ── */
function LearnScreen({onBack}){
  const [msgs,setMsgs]=useState([{role:"luna",text:"📚 Welcome to the **Knowledge Hub**!\n\nAsk me anything about crystals, tarot, chakras, astrology, energy healing, or spiritual marketplace strategy. I'm here to deepen your expertise.\n\nWhat would you like to master today?",id:0}]);
  const [input,setInput]=useState("");
  const [typing,setTyping]=useState(false);
  const [showSug,setShowSug]=useState(true);
  const bottomRef=useRef(null);
  const nid=useRef(1);
  const SUGS=["Best crystals for beginners","How to cleanse crystals","Tarot deck selection guide","The 7 chakras explained","Reiki and energy healing","Marketplace business strategy","Oracle vs Tarot cards","Building a daily meditation practice"];
  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:"smooth"}); },[msgs,typing]);
  const send=(text)=>{
    if(!text.trim()||typing) return;
    setMsgs(p=>[...p,{role:"user",text:text.trim(),id:nid.current++}]);
    setInput(""); setShowSug(false); setTyping(true);
    setTimeout(()=>{
      setMsgs(p=>[...p,{role:"luna",text:getKBAnswer(text),id:nid.current++}]);
      setTyping(false);
    },1100+Math.random()*700);
  };
  return(
    <div className="fade-in" style={{width:"100%",maxWidth:"680px",zIndex:10,display:"flex",flexDirection:"column",height:"90vh",maxHeight:"700px"}}>
      <TopBar title="📚 Knowledge Hub" subtitle="Ask Luna anything" onBack={onBack}/>
      <div style={{flex:1,overflowY:"auto",padding:"20px",display:"flex",flexDirection:"column",gap:"14px",background:C.card,backdropFilter:"blur(20px)",border:`1px solid ${C.border}`,borderRadius:"0 0 0 0"}}>
        {msgs.map(m=><ChatBubble key={m.id} msg={m} role="luna"/>)}
        {typing&&<TypingDots/>}
        {showSug&&!typing&&<SugChips items={SUGS} onPick={send}/>}
        <div ref={bottomRef}/>
      </div>
      <ChatInput value={input} onChange={setInput} onSend={send} disabled={typing}/>
    </div>
  );
}

      <div style={{background:C.card,backdropFilter:"blur(20px)",border:`1px solid ${C.border}`,borderRadius:"0 0 24px 24px",padding:"20px",display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:"12px"}}>
        {PERSONAS.map(p=>(

            <div style={{fontSize:"2.2rem",marginBottom:"8px"}}>{p.emoji}</div>

/* ── SIMULATOR ── */
function SimulatorScreen({persona,onBack,onHome}){
  const [msgs,setMsgs]=useState([{role:"client",text:persona.opening,id:0,tip:null}]);
  const [input,setInput]=useState("");
  const [typing,setTyping]=useState(false);
  const [scriptIdx,setScriptIdx]=useState(0);
  const [done,setDone]=useState(false);
  const [showTips,setShowTips]=useState(true);
  const bottomRef=useRef(null);
  const nid=useRef(1);
  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:"smooth"}); },[msgs,typing]);

  const send=(text)=>{
    if(!text.trim()||typing||done) return;
    const userMsg={role:"expert",text:text.trim(),id:nid.current++};
    setMsgs(p=>[...p,userMsg]);
    setInput(""); setTyping(true);
    setTimeout(()=>{
      const l=text.toLowerCase();
      const script=persona.script;
      let matched=null;
      if(scriptIdx<script.length){
        const step=script[scriptIdx];
        if(step.trigger.some(t=>l.includes(t))){ matched=step; setScriptIdx(i=>i+1); }
        else{ matched=persona.fallback; }
      } else { setDone(true); }
      if(matched){
        setMsgs(p=>[...p,{role:"client",text:matched.client,tip:matched.tip,id:nid.current++}]);
      } else {
        setMsgs(p=>[...p,{role:"client",text:"Thank you so much — this has been incredibly helpful. I feel confident moving forward! 🙏",tip:"Excellent session! You successfully guided the client through the full conversation arc. This is the kind of expertise that builds lasting client relationships.",id:nid.current++}]);
      }
      setTyping(false);
    },1200+Math.random()*600);
  };

  const progress=Math.min(100,Math.round((scriptIdx/persona.script.length)*100));

  return(
    <div className="fade-in" style={{width:"100%",maxWidth:"680px",zIndex:10,display:"flex",flexDirection:"column",height:"90vh",maxHeight:"720px"}}>
      {/* header */}
      <div style={{background:C.card,backdropFilter:"blur(20px)",border:`1px solid ${C.border}`,borderRadius:"24px 24px 0 0",padding:"14px 20px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"10px"}}>
          <button className="btn-ghost" onClick={onBack} style={{background:"rgba(255,255,255,.06)",border:`1px solid ${C.border}`,color:C.muted,borderRadius:"10px",padding:"6px 14px",fontSize:"0.78rem",cursor:"pointer"}}>← Personas</button>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:"0.85rem",fontWeight:700,color:"#f0ecff"}}>{persona.emoji} {persona.name}</div>
            <div style={{fontSize:"0.72rem",color:C.muted}}>{persona.tagline}</div>
          </div>
          <button className="btn-ghost" onClick={()=>setShowTips(t=>!t)} style={{background:"rgba(255,255,255,.06)",border:`1px solid ${C.border}`,color:showTips?"#fbbf24":C.muted,borderRadius:"10px",padding:"6px 12px",fontSize:"0.78rem",cursor:"pointer"}}>💡 Tips {showTips?"ON":"OFF"}</button>
        </div>
        {/* progress */}
        <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
          <div style={{flex:1,height:"5px",background:"rgba(255,255,255,.08)",borderRadius:"10px",overflow:"hidden"}}>
            <div style={{width:`${progress}%`,height:"100%",background:`linear-gradient(90deg,${C.purple},${C.lavender})`,borderRadius:"10px",transition:"width .5s ease"}}/>
          </div>
          <span style={{fontSize:"0.72rem",color:C.muted,flexShrink:0}}>{progress}% complete</span>
        </div>
      </div>
      {/* messages */}
      <div style={{flex:1,overflowY:"auto",padding:"16px 20px",display:"flex",flexDirection:"column",gap:"14px",background:"rgba(13,8,32,.6)",backdropFilter:"blur(16px)",borderLeft:`1px solid ${C.border}`,borderRight:`1px solid ${C.border}`}}>
        {/* legend */}
        <div style={{display:"flex",gap:"16px",padding:"8px 12px",background:"rgba(255,255,255,.04)",borderRadius:"10px",fontSize:"0.72rem",color:C.muted}}>
          <span><span style={{color:persona.color}}>●</span> Client ({persona.name})</span>
          <span><span style={{color:"#93c5fd"}}>●</span> You (Expert)</span>
          {showTips&&<span><span style={{color:"#fbbf24"}}>●</span> Expert Tip</span>}
        </div>
        {msgs.map(m=>(
          <div key={m.id} className="slide-in">
            {m.role==="client"&&(
              <div style={{display:"flex",gap:"10px",alignItems:"flex-start"}}>
                <div style={{width:"32px",height:"32px",borderRadius:"50%",background:`${persona.color}33`,border:`1px solid ${persona.color}66`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px",flexShrink:0,marginTop:"2px"}}>{persona.emoji}</div>
                <div style={{flex:1}}>
                  <div style={{background:"rgba(255,255,255,.06)",border:`1px solid rgba(255,255,255,.1)`,borderRadius:"4px 16px 16px 16px",padding:"12px 16px",fontSize:"0.875rem",lineHeight:"1.6",color:"#f0ecff",marginBottom: showTips&&m.tip?"8px":"0"}}>{m.text}</div>
                  {showTips&&m.tip&&(
                    <div className="pop" style={{background:C.feedback,border:`1px solid ${C.feedbackBorder}`,borderRadius:"10px",padding:"10px 14px",fontSize:"0.78rem",lineHeight:"1.55",color:"#fde68a"}}>
                      💡 <strong>Expert Tip:</strong> {m.tip}
                    </div>
                  )}
                </div>
              </div>
            )}
            {m.role==="expert"&&(
              <div style={{display:"flex",justifyContent:"flex-end"}}>
                <div style={{maxWidth:"75%",background:"linear-gradient(135deg,rgba(99,102,241,.45),rgba(139,92,246,.4))",border:"1px solid rgba(139,92,246,.35)",borderRadius:"16px 4px 16px 16px",padding:"11px 16px",fontSize:"0.875rem",lineHeight:"1.6",color:"#f0ecff"}}>{m.text}</div>
              </div>
            )}
          </div>
        ))}
        {typing&&(
          <div style={{display:"flex",gap:"10px",alignItems:"center"}}>
            <div style={{width:"32px",height:"32px",borderRadius:"50%",background:`${persona.color}33`,border:`1px solid ${persona.color}66`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px"}}>{persona.emoji}</div>
            <div style={{padding:"12px 18px",borderRadius:"4px 16px 16px 16px",background:"rgba(255,255,255,.06)",display:"flex",gap:"6px",alignItems:"center"}}>
              {[0,1,2].map(i=><div key={i} style={{width:"7px",height:"7px",borderRadius:"50%",background:persona.color,animation:`dot 1.2s ease-in-out ${i*.2}s infinite`}}/>)}
            </div>
          </div>
        )}
        {done&&(
          <div className="pop" style={{textAlign:"center",padding:"20px",background:"rgba(155,89,255,.12)",border:"1px solid rgba(192,132,252,.3)",borderRadius:"16px"}}>
            <div style={{fontSize:"2rem",marginBottom:"8px"}}>🎉</div>
            <div style={{fontWeight:700,color:"#e2c9ff",marginBottom:"4px"}}>Session Complete!</div>
            <div style={{fontSize:"0.8rem",color:C.muted,marginBottom:"14px"}}>You successfully completed this client scenario.</div>
            <button className="btn-primary" onClick={onBack} style={{background:"linear-gradient(135deg,#9b59ff,#c084fc)",border:"none",color:"white",padding:"8px 20px",borderRadius:"12px",cursor:"pointer",fontSize:"0.82rem",fontWeight:600}}>Try Another Client →</button>
          </div>
        )}
        <div ref={bottomRef}/>
      </div>
      {!done&&<ChatInput value={input} onChange={setInput} onSend={send} disabled={typing} placeholder={`Respond as the expert to ${persona.name}…`}/>}
    </div>
  );
}

/* ── QUIZ ── */
function QuizScreen({onBack}){
  const [idx,setIdx]=useState(0);
  const [selected,setSelected]=useState(null);
  const [confirmed,setConfirmed]=useState(false);
  const [score,setScore]=useState(0);
  const [finished,setFinished]=useState(false);
  const [answers,setAnswers]=useState([]);

  const q=QUIZ[idx];
  const isCorrect=selected===q.ans;

  const confirm=()=>{
    if(selected===null) return;
    setConfirmed(true);
    if(selected===q.ans) setScore(s=>s+1);
    setAnswers(a=>[...a,{q:q.q,selected,correct:q.ans,ok:selected===q.ans}]);
  };
  const next=()=>{
    if(idx<QUIZ.length-1){ setIdx(i=>i+1); setSelected(null); setConfirmed(false); }
    else setFinished(true);
  };

  const pct=Math.round((score/QUIZ.length)*100);
  const grade=pct>=90?"🏆 Expert":pct>=70?"⭐ Proficient":pct>=50?"📚 Developing":"🌱 Keep Studying";

  if(finished) return(
    <div className="fade-up" style={{width:"100%",maxWidth:"560px",zIndex:10,textAlign:"center"}}>
      <div style={{background:C.card,backdropFilter:"blur(20px)",border:`1px solid ${C.border}`,borderRadius:"24px",padding:"36px 30px"}}>
        <div style={{fontSize:"3rem",marginBottom:"12px"}}>{pct>=70?"🎉":"📖"}</div>
        <h2 style={{fontWeight:800,fontSize:"1.5rem",color:"#f0ecff",marginBottom:"6px"}}>{grade}</h2>
        <div style={{fontSize:"2.5rem",fontWeight:800,background:"linear-gradient(90deg,#c084fc,#f9a8d4)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:"4px"}}>{score}/{QUIZ.length}</div>
        <p style={{color:C.muted,fontSize:"0.85rem",marginBottom:"24px"}}>{pct}% correct</p>
        <div style={{textAlign:"left",marginBottom:"24px",display:"flex",flexDirection:"column",gap:"8px"}}>
          {answers.map((a,i)=>(
            <div key={i} style={{display:"flex",gap:"10px",alignItems:"flex-start",padding:"8px 12px",background:a.ok?"rgba(74,222,128,.08)":"rgba(248,113,113,.08)",border:`1px solid ${a.ok?"rgba(74,222,128,.25)":"rgba(248,113,113,.25)"}`,borderRadius:"10px",fontSize:"0.78rem"}}>
              <span style={{fontSize:"1rem",flexShrink:0}}>{a.ok?"✅":"❌"}</span>
              <div>
                <div style={{color:"#f0ecff",marginBottom:"2px"}}>{a.q}</div>
                {!a.ok&&<div style={{color:"rgba(248,113,113,.9)"}}>Your answer: <em>{QUIZ[i].opts[a.selected]}</em> — Correct: <strong style={{color:"rgba(74,222,128,.9)"}}>{QUIZ[i].opts[a.correct]}</strong></div>}
              </div>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:"12px",justifyContent:"center"}}>
          <button className="btn-ghost" onClick={()=>{setIdx(0);setSelected(null);setConfirmed(false);setScore(0);setFinished(false);setAnswers([]);}} style={{background:"rgba(255,255,255,.06)",border:`1px solid ${C.border}`,color:C.muted,borderRadius:"12px",padding:"10px 20px",fontSize:"0.82rem",cursor:"pointer"}}>Retake Quiz</button>
          <button className="btn-primary" onClick={onBack} style={{background:"linear-gradient(135deg,#9b59ff,#c084fc)",border:"none",color:"white",padding:"10px 20px",borderRadius:"12px",cursor:"pointer",fontSize:"0.82rem",fontWeight:600}}>Back to Home</button>
        </div>
      </div>
    </div>
  );

  return(
    <div className="fade-in" style={{width:"100%",maxWidth:"560px",zIndex:10}}>
      <TopBar title="✨ Knowledge Quiz" subtitle={`Question ${idx+1} of ${QUIZ.length}`} onBack={onBack}/>
      <div style={{background:C.card,backdropFilter:"blur(20px)",border:`1px solid ${C.border}`,borderRadius:"0 0 24px 24px",padding:"24px"}}>
        {/* progress */}
        <div style={{height:"4px",background:"rgba(255,255,255,.08)",borderRadius:"10px",marginBottom:"20px",overflow:"hidden"}}>
          <div style={{width:`${((idx)/QUIZ.length)*100}%`,height:"100%",background:`linear-gradient(90deg,${C.purple},${C.lavender})`,borderRadius:"10px",transition:"width .4s"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:"20px",fontSize:"0.8rem",color:C.muted}}>
          <span>Score: <strong style={{color:"#a78bfa"}}>{score}</strong></span>
          <span style={{color:"#a78bfa",fontWeight:600}}>Q{idx+1}/{QUIZ.length}</span>
        </div>
        <h3 style={{fontWeight:700,fontSize:"1rem",lineHeight:"1.55",color:"#f0ecff",marginBottom:"18px"}}>{q.q}</h3>
        <div style={{display:"flex",flexDirection:"column",gap:"10px",marginBottom:"20px"}}>
          {q.opts.map((opt,i)=>{
            let bg="rgba(255,255,255,.05)",border=C.border,color="#e8dff5";
            if(selected===i&&!confirmed){bg="rgba(155,89,255,.2)";border="rgba(192,132,252,.6)";}
            if(confirmed&&i===q.ans){bg="rgba(74,222,128,.15)";border="rgba(74,222,128,.5)";color="#86efac";}
            if(confirmed&&i===selected&&i!==q.ans){bg="rgba(248,113,113,.15)";border="rgba(248,113,113,.5)";color="#fca5a5";}
            return(
              <div key={i} className={!confirmed?"quiz-opt":""} onClick={()=>!confirmed&&setSelected(i)} style={{padding:"12px 16px",borderRadius:"12px",background:bg,border:`1px solid ${border}`,color,fontSize:"0.875rem",lineHeight:"1.45",cursor:confirmed?"default":"pointer",display:"flex",alignItems:"center",gap:"10px"}}>
                <span style={{width:"22px",height:"22px",borderRadius:"50%",background:"rgba(255,255,255,.07)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.75rem",flexShrink:0,fontWeight:700}}>
                  {confirmed&&i===q.ans?"✓":confirmed&&i===selected&&i!==q.ans?"✗":String.fromCharCode(65+i)}
                </span>
                {opt}
              </div>
            );
          })}
        </div>
        {!confirmed?(
          <button className="btn-primary" onClick={confirm} disabled={selected===null} style={{width:"100%",padding:"12px",borderRadius:"14px",border:"none",background:selected!==null?"linear-gradient(135deg,#9b59ff,#c084fc)":"rgba(155,89,255,.2)",color:selected!==null?"white":"rgba(212,184,255,.4)",fontSize:"0.9rem",fontWeight:600,cursor:selected!==null?"pointer":"default"}}>Check Answer</button>
        ):(
          <button className="btn-primary" onClick={next} style={{width:"100%",padding:"12px",borderRadius:"14px",border:"none",background:"linear-gradient(135deg,#9b59ff,#c084fc)",color:"white",fontSize:"0.9rem",fontWeight:600,cursor:"pointer"}}>
            {idx<QUIZ.length-1?"Next Question →":"See Results 🎉"}
          </button>
        )}
      </div>
    </div>
  );
}

/* ── SHARED COMPONENTS ── */
function TopBar({title,subtitle,onBack}){
  return(
    <div style={{background:C.card,backdropFilter:"blur(20px)",border:`1px solid ${C.border}`,borderBottom:"none",borderRadius:"24px 24px 0 0",padding:"14px 20px",display:"flex",alignItems:"center",gap:"14px"}}>
      <button className="btn-ghost" onClick={onBack} style={{background:"rgba(255,255,255,.06)",border:`1px solid ${C.border}`,color:C.muted,borderRadius:"10px",padding:"6px 14px",fontSize:"0.78rem",cursor:"pointer",flexShrink:0}}>← Home</button>
      <div>
        <div style={{fontWeight:700,color:"#f0ecff",fontSize:"0.95rem"}}>{title}</div>
        <div style={{fontSize:"0.72rem",color:C.muted}}>{subtitle}</div>
      </div>
    </div>
  );
}

function ChatBubble({msg}){
  const isLuna=msg.role==="luna";
  return(
    <div className="slide-in" style={{display:"flex",justifyContent:isLuna?"flex-start":"flex-end"}}>
      {isLuna&&<div style={{width:"32px",height:"32px",borderRadius:"50%",background:"linear-gradient(135deg,#9b59ff,#c084fc)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px",flexShrink:0,marginRight:"10px",marginTop:"2px",boxShadow:"0 0 12px rgba(155,89,255,.4)"}}>🌙</div>}
      <div style={{maxWidth:"78%",padding:isLuna?"13px 17px":"10px 16px",borderRadius:isLuna?"4px 16px 16px 16px":"16px 4px 16px 16px",background:isLuna?"linear-gradient(135deg,rgba(155,89,255,.14),rgba(192,132,252,.08))":"linear-gradient(135deg,rgba(99,102,241,.45),rgba(139,92,246,.4))",border:isLuna?`1px solid ${C.border}`:"1px solid rgba(139,92,246,.35)",fontSize:"0.875rem",lineHeight:"1.65",color:isLuna?"#e8dff5":"#f0ecff"}}>
        <FmtText text={msg.text}/>
      </div>
    </div>
  );
}

function TypingDots(){
  return(
    <div style={{display:"flex",gap:"10px",alignItems:"center"}}>
      <div style={{width:"32px",height:"32px",borderRadius:"50%",background:"linear-gradient(135deg,#9b59ff,#c084fc)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px"}}>🌙</div>
      <div style={{padding:"12px 18px",borderRadius:"4px 16px 16px 16px",background:"rgba(155,89,255,.1)",border:`1px solid ${C.border}`,display:"flex",gap:"6px",alignItems:"center"}}>
        {[0,1,2].map(i=><div key={i} style={{width:"7px",height:"7px",borderRadius:"50%",background:"#c084fc",animation:`dot 1.2s ease-in-out ${i*.2}s infinite`}}/>)}
      </div>
    </div>
  );
}

function SugChips({items,onPick}){
  return(
    <div style={{display:"flex",flexWrap:"wrap",gap:"8px",marginTop:"4px"}}>
      {items.map((p,i)=>(
        <button key={i} onClick={()=>onPick(p)} style={{padding:"7px 14px",borderRadius:"20px",fontSize:"0.77rem",cursor:"pointer",background:"rgba(155,89,255,.15)",border:"1px solid rgba(180,130,255,.3)",color:"#d4b8ff",fontFamily:"inherit",transition:"all .2s"}}
          onMouseOver={e=>{e.target.style.background="rgba(180,130,255,.25)";e.target.style.transform="translateY(-1px)"}}
          onMouseOut={e=>{e.target.style.background="rgba(155,89,255,.15)";e.target.style.transform="translateY(0)"}}>{p}</button>
      ))}
    </div>
  );
}

function ChatInput({value,onChange,onSend,disabled,placeholder}){
  const handleKey=(e)=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();onSend(value);} };
  return(
    <div style={{background:C.card,backdropFilter:"blur(20px)",border:`1px solid ${C.border}`,borderTop:"none",borderRadius:"0 0 24px 24px",padding:"14px 18px",display:"flex",gap:"10px",alignItems:"flex-end"}}>
      <textarea rows={1} value={value} onChange={e=>onChange(e.target.value)} onKeyDown={handleKey}
        placeholder={placeholder||"Type your message… (Enter to send)"}
        style={{flex:1,resize:"none",background:"rgba(255,255,255,.05)",border:`1px solid rgba(180,130,255,.25)`,borderRadius:"14px",padding:"10px 15px",color:"#e8dff5",fontSize:"0.875rem",fontFamily:"inherit",lineHeight:"1.5",maxHeight:"100px",overflowY:"auto"}}/>
      <button onClick={()=>onSend(value)} disabled={disabled||!value.trim()}
        style={{width:"42px",height:"42px",borderRadius:"50%",border:"none",cursor:value.trim()&&!disabled?"pointer":"default",background:value.trim()&&!disabled?"linear-gradient(135deg,#9b59ff,#c084fc)":"rgba(155,89,255,.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"18px",flexShrink:0,boxShadow:value.trim()&&!disabled?"0 0 18px rgba(155,89,255,.4)":"none",transition:"all .2s"}}>✦</button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
